name: Fetch HTML

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
        type: string
  schedule:
    # Daily at 6:23 AM UTC (uses a default URL)
    - cron: '23 6 * * *'
  push:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch the URL and save HTML
        run: |
          echo "Fetching $TARGET_URL"
          curl -L --fail -o output.html "$TARGET_URL"
          echo "Saved to output.html"
        env:
          # Uses the URL you provide on manual run, otherwise falls back to a default
          TARGET_URL: ${{ github.event.inputs.url || 'https://example.com' }}

      - name: Commit and push
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          timestamp=$(date -u)
          git commit -m "Fetch ${timestamp}" || exit 0
          git pull --rebase
          git push
